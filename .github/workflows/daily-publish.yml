name: 每日家常菜自动发布

on:
  workflow_dispatch:
    # 仅允许手动触发测试（已迁移至 CloudBase 定时执行）

env:
  PYTHONUNBUFFERED: '1'
  LOG_LEVEL: 'INFO'

jobs:
  publish-recipe:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: recipe-publish
      cancel-in-progress: false

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建临时目录
        run: mkdir -p recipes

      - name: 运行发布脚本
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          JUHE_API_KEY: ${{ secrets.JUHE_API_KEY }}
          PRIMARY_SCRAPER: 'juhe'
          RECIPE_CATEGORY: '家常菜'
        run: python src/main.py

      - name: 上传失败日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-debug-logs
          path: |
            recipes/
            *.log
          retention-days: 7
